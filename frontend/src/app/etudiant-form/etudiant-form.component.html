<div class="row mb-4">
  <div class="col">
    <h2 class="text-primary">{{ editMode ? 'Modifier' : 'Nouvel' }} Étudiant</h2>
  </div>
</div>

<div class="card shadow-sm">
  <div class="card-body">
    <form [formGroup]="etudiantForm" (ngSubmit)="onSubmit()">
      <div class="row">
        <div class="col-md-6 form-group">
          <label>Nom</label>
          <input type="text" class="form-control" formControlName="nom">
        </div>
        <div class="col-md-6 form-group">
          <label>Prénom</label>
          <input type="text" class="form-control" formControlName="prenom">
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 form-group">
          <label>Email</label>
          <input type="email" class="form-control" formControlName="email">
        </div>
        <div class="col-md-6 form-group">
          <label>CNE</label>
          <input type="text" class="form-control" formControlName="cne">
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 form-group">
          <label>Téléphone</label>
          <input type="text" class="form-control" formControlName="tel">
        </div>
        <div class="col-md-6 form-group">
          <label>Filière</label>
          <app-searchable-select formControlName="filiere" [items]="filieres" bindLabel="intitule" placeholder="Sélectionner une filière"></app-searchable-select>
        </div>
      </div>

      <div class="mt-4 text-right">
        <button type="button" class="btn btn-secondary mr-2" routerLink="/etudiants">Annuler</button>
        <button type="submit" class="btn btn-primary" [disabled]="etudiantForm.invalid">
          {{ editMode ? 'Mettre à jour' : 'Enregistrer' }}
        </button>
      </div>
    </form>
  </div>
</div>
