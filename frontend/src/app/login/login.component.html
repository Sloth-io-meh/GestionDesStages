<div class="container">
  <!-- Outer Row -->
  <div class="row justify-content-center">
    <div class="col-xl-10 col-lg-12 col-md-9">
      <div class="card o-hidden border-0 shadow-lg my-5">
        <div class="card-body p-0">
          <!-- Nested Row within Card Body -->
          <div class="row">
            <div class="col-lg-6 d-none d-lg-block bg-login-image" style="background: url('https://images.unsplash.com/photo-1523050853063-8931a677ab4a?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80'); background-size: cover; background-position: center;"></div>
            <div class="col-lg-6">
              <div class="p-5">
                <div class="text-center">
                  <h1 class="h4 text-gray-900 mb-4">Bienvenue !</h1>
                </div>
                <form class="user" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
                  <div class="form-group">
                    <input type="text" formControlName="username" class="form-control form-control-user" id="exampleInputEmail" aria-describedby="emailHelp" placeholder="Nom d'utilisateur...">
                  </div>
                  <div class="form-group">
                    <input type="password" formControlName="password" class="form-control form-control-user" id="exampleInputPassword" placeholder="Mot de passe">
                  </div>
                  <button type="submit" class="btn btn-primary btn-user btn-block" [disabled]="loginForm.invalid || loading">
                    <span *ngIf="loading" class="spinner-border spinner-border-sm mr-2"></span>
                    Se connecter
                  </button>
                </form>
                <hr>
                <div class="text-center">
                  <p class="small text-muted">Utilisez <strong>admin</strong> / <strong>admin</strong> pour tester.</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
