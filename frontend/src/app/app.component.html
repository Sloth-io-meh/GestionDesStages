<!-- Page Wrapper -->
<div id="wrapper" [class.bg-gradient-primary]="!(authService.currentUser | async)">

  <!-- Sidebar -->
  <ul class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion" [class.toggled]="sidebarToggled" id="accordionSidebar" *ngIf="authService.currentUser | async as user">

    <!-- Sidebar - Brand -->
    <a class="sidebar-brand d-flex align-items-center justify-content-center" routerLink="/">
      <div class="sidebar-brand-icon rotate-n-15">
        <i class="fas fa-graduation-cap"></i>
      </div>
      <div class="sidebar-brand-text mx-3">PFE Manager</div>
    </a>

    <!-- Divider -->
    <hr class="sidebar-divider my-0">

    <!-- Nav Item - Dashboard -->
    <li class="nav-item" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
      <a class="nav-link" routerLink="/">
        <i class="fas fa-fw fa-tachometer-alt"></i>
        <span>Tableau de Bord</span>
      </a>
    </li>

    <!-- Divider -->
    <hr class="sidebar-divider">

    <!-- Heading -->
    <div class="sidebar-heading">
      Gestion
    </div>

    <!-- Nav Item - Stages -->
    <li class="nav-item" routerLinkActive="active">
      <a class="nav-link" routerLink="/stages">
        <i class="fas fa-fw fa-clipboard-list"></i>
        <span>Stages</span>
      </a>
    </li>

    <!-- Nav Item - Étudiants -->
    <li class="nav-item" routerLinkActive="active">
      <a class="nav-link" routerLink="/etudiants">
        <i class="fas fa-fw fa-user-graduate"></i>
        <span>Étudiants</span>
      </a>
    </li>

    <!-- Nav Item - Filières -->
    <li class="nav-item" routerLinkActive="active">
      <a class="nav-link" routerLink="/filieres">
        <i class="fas fa-fw fa-book"></i>
        <span>Filières</span>
      </a>
    </li>

    <!-- Nav Item - Entreprises -->
    <li class="nav-item" routerLinkActive="active">
      <a class="nav-link" routerLink="/entreprises">
        <i class="fas fa-fw fa-building"></i>
        <span>Entreprises</span>
      </a>
    </li>

    <!-- Nav Item - Encadrants -->
    <li class="nav-item" routerLinkActive="active">
      <a class="nav-link" routerLink="/encadrants">
        <i class="fas fa-fw fa-user-tie"></i>
        <span>Encadrants</span>
      </a>
    </li>

    <!-- Divider -->
    <hr class="sidebar-divider d-none d-md-block">

    <!-- Sidebar Toggler (Sidebar) -->
    <div class="text-center d-none d-md-inline">
      <button class="rounded-circle border-0" id="sidebarToggle" (click)="toggleSidebar()"></button>
    </div>

  </ul>
  <!-- End of Sidebar -->

  <!-- Content Wrapper -->
  <div id="content-wrapper" class="d-flex flex-column">

    <!-- Main Content -->
    <div id="content">

      <!-- Topbar -->
      <nav class="navbar navbar-expand navbar-light bg-white topbar mb-4 static-top shadow" *ngIf="authService.currentUser | async as user">

        <!-- Sidebar Toggle (Topbar) -->
        <button id="sidebarToggleTop" class="btn btn-link d-md-none rounded-circle mr-3" (click)="toggleSidebar()">
          <i class="fa fa-bars"></i>
        </button>

        <!-- Topbar Navbar -->
        <ul class="navbar-nav ml-auto">

          <div class="topbar-divider d-none d-sm-block"></div>

          <!-- Nav Item - User Information -->
          <li class="nav-item dropdown no-arrow">
            <a class="nav-link dropdown-toggle" href="javascript:void(0)" id="userDropdown" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false" (click)="logout()">
              <span class="mr-2 d-none d-lg-inline text-gray-600 small">{{ user.username }}</span>
              <i class="fas fa-user-circle fa-lg text-gray-400"></i>
              <span class="ml-2 btn btn-sm btn-outline-danger">Déconnexion</span>
            </a>
          </li>

        </ul>

      </nav>
      <!-- End of Topbar -->

      <!-- Begin Page Content -->
      <div class="container-fluid">
        <!-- Notifications -->
        <div style="position: absolute; top: 1rem; right: 1rem; z-index: 1050; width: 300px;">
          <div *ngFor="let n of notifications" class="alert alert-{{n.type}} shadow-sm fade show" role="alert">
            {{ n.message }}
          </div>
        </div>

        <router-outlet></router-outlet>
      </div>
      <!-- /.container-fluid -->

    </div>
    <!-- End of Main Content -->

    <!-- Footer -->
    <footer class="sticky-footer bg-white">
      <div class="container my-auto">
        <div class="copyright text-center my-auto">
          <span>&copy; 2026 Faculté des Sciences Semlalia - Gestion des PFE</span>
        </div>
      </div>
    </footer>
    <!-- End of Footer -->

  </div>
  <!-- End of Content Wrapper -->

</div>
<!-- End of Page Wrapper -->
