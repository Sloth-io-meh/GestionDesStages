<div class="row mb-4 align-items-center">
  <div class="col">
    <h2 class="text-primary mb-0">Encadrants Académiques</h2>
  </div>
  <div class="col-auto">
    <a routerLink="/encadrants/nouveau" class="btn btn-success shadow-sm">
      <i class="fas fa-plus mr-2"></i>Nouvel Encadrant
    </a>
  </div>
</div>

<div class="card shadow-sm mb-4">
  <div class="card-body">
    <div class="row">
      <div class="col-md-6">
        <div class="input-group">
          <div class="input-group-prepend">
            <span class="input-group-text"><i class="fas fa-search"></i></span>
          </div>
          <input type="text" class="form-control" placeholder="Rechercher un encadrant..." (input)="onSearch($event)">
        </div>
      </div>
    </div>
  </div>
</div>

<div class="card shadow-sm">
  <div class="card-body p-0">
    <table class="table table-hover mb-0">
      <thead class="thead-light">
        <tr>
          <th>Nom & Prénom</th>
          <th>Département</th>
          <th>Établissement</th>
          <th class="text-right">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let e of paginatedEncadrants">
          <td><strong>{{ e.nom }}</strong></td>
          <td>{{ e.departement }}</td>
          <td>{{ e.etablissement }}</td>
          <td class="text-right">
            <div class="btn-group">
              <a [routerLink]="['/encadrants/modifier', e.id]" class="btn btn-sm btn-outline-primary">
                <i class="fas fa-edit"></i>
              </a>
              <button class="btn btn-sm btn-outline-danger" (click)="deleteEncadrant(e.id)">
                <i class="fas fa-trash"></i>
              </button>
            </div>
          </td>
        </tr>
        <tr *ngIf="filteredEncadrants.length === 0">
          <td colspan="4" class="text-center py-5 text-muted">
            Aucun encadrant trouvé.
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="card-footer bg-white border-top-0 py-3" *ngIf="filteredEncadrants.length > 0">
    <div class="row align-items-center">
      <div class="col-md-4 text-muted small">
        Affichage de {{ startIndex + 1 }} à {{ endIndex }} sur {{ filteredEncadrants.length }} encadrants
      </div>
      <div class="col-md-4">
        <nav *ngIf="totalPages > 1">
          <ul class="pagination justify-content-center mb-0">
            <li class="page-item" [class.disabled]="currentPage === 1">
              <a class="page-link" (click)="setPage(1)" style="cursor: pointer;" title="Premier">
                <i class="fas fa-angle-double-left"></i>
              </a>
            </li>
            <li class="page-item" [class.disabled]="currentPage === 1">
              <a class="page-link" (click)="setPage(currentPage - 1)" style="cursor: pointer;" title="Précédent">
                <i class="fas fa-chevron-left"></i>
              </a>
            </li>
            <li class="page-item" *ngFor="let page of getPages()" [class.active]="currentPage === page">
              <a class="page-link" (click)="setPage(page)" style="cursor: pointer;">{{ page }}</a>
            </li>
            <li class="page-item" [class.disabled]="currentPage === totalPages">
              <a class="page-link" (click)="setPage(currentPage + 1)" style="cursor: pointer;" title="Suivant">
                <i class="fas fa-chevron-right"></i>
              </a>
            </li>
            <li class="page-item" [class.disabled]="currentPage === totalPages">
              <a class="page-link" (click)="setPage(totalPages)" style="cursor: pointer;" title="Dernier">
                <i class="fas fa-angle-double-right"></i>
              </a>
            </li>
          </ul>
        </nav>
      </div>
      <div class="col-md-4 text-right">
        <div class="form-inline justify-content-end">
          <label class="mr-2 small text-muted">Afficher:</label>
          <select class="form-control form-control-sm w-auto" (change)="onPageSizeChange($event)" [value]="pageSize">
            <option [value]="5">5</option>
            <option [value]="10">10</option>
            <option [value]="25">25</option>
            <option [value]="50">50</option>
          </select>
        </div>
      </div>
    </div>
  </div>
</div>
