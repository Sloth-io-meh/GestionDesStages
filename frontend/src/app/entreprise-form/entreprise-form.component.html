<div class="row mb-4">
  <div class="col">
    <h2 class="text-primary">{{ editMode ? 'Modifier' : 'Nouvelle' }} Entreprise</h2>
  </div>
</div>

<div class="card shadow-sm">
  <div class="card-body">
    <form [formGroup]="entrepriseForm" (ngSubmit)="onSubmit()">
      <div class="row">
        <div class="col-md-6 form-group">
          <label>Nom de l'Entreprise</label>
          <input type="text" class="form-control" formControlName="nom">
        </div>
        <div class="col-md-6 form-group">
          <label>Email Contact</label>
          <input type="email" class="form-control" formControlName="email">
        </div>
      </div>

      <div class="row">
        <div class="col-md-4 form-group">
          <label>Ville</label>
          <input type="text" class="form-control" formControlName="ville">
        </div>
        <div class="col-md-4 form-group">
          <label>Pays</label>
          <input type="text" class="form-control" formControlName="pays">
        </div>
        <div class="col-md-4 form-group">
          <label>Téléphone</label>
          <input type="text" class="form-control" formControlName="telephone">
        </div>
      </div>

      <div class="form-group">
        <label>Adresse complète</label>
        <textarea class="form-control" formControlName="adresse" rows="2"></textarea>
      </div>

      <hr>
      <h5 class="text-secondary mb-3">Responsables & Encadrement Professionnel</h5>

      <div class="row">
        <div class="col-md-12 form-group">
          <label>Responsable Entreprise (Nom complet)</label>
          <input type="text" class="form-control" formControlName="nomResponsable">
        </div>
      </div>

      <div class="row">
        <div class="col-md-4 form-group">
          <label>Encadrant en Entreprise</label>
          <input type="text" class="form-control" formControlName="nomEncadrant">
        </div>
        <div class="col-md-4 form-group">
          <label>Email Encadrant</label>
          <input type="email" class="form-control" formControlName="emailEncadrant">
        </div>
        <div class="col-md-4 form-group">
          <label>Tél Encadrant</label>
          <input type="text" class="form-control" formControlName="telEncadrant">
        </div>
      </div>

      <div class="mt-4 text-right">
        <button type="button" class="btn btn-secondary mr-2" routerLink="/entreprises">Annuler</button>
        <button type="submit" class="btn btn-primary" [disabled]="entrepriseForm.invalid">
          Enregistrer
        </button>
      </div>
    </form>
  </div>
</div>
